name: Publish to npm (with provenance)

# Publishes @cryptoapis-io/offline-signer to npmjs.org with a Sigstore
# provenance attestation linking the package to this repo, commit and build.
#
# Trigger: publish a GitHub Release (recommended), or run manually.
# Requirements:
#   - Repo secret NPM_TOKEN — a granular automation token for the @cryptoapis-io
#     org with "Read and write" publish access to the package.
#   - id-token: write — OIDC, so npm can mint the provenance attestation.
#   - The release tag SHOULD match the package.json version (e.g. v0.1.0).

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke test — EVM signing
        run: npm run test:evm

      - name: Smoke test — UTXO signing
        run: npm run test:utxo

      - name: Verify tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          echo "package.json → $PKG_VERSION | release tag → $TAG"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
